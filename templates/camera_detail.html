<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.camera.Name}} - Системы видеонаблюдения</title>
    <link rel="stylesheet" href="/static/styles/main.css?v=5">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/cameras" class="home-link">
                    <img src="/static/img/logo.png" alt="HiQ" class="img-responsive">
                </a>
            </div>
        </div>
    </header>

    <div class="search-cart-section">
        <div class="container">
            <div class="search-cart-content">
                <div class="search-form">
                    <form action="/cameras" method="GET">
                        <div class="search_form">
                            <input type="text" name="search" placeholder="Поиск по камерам">
                            <button type="submit">
                                🔍
                            </button>
                        </div>
                    </form>
                </div>
                
                <div class="cart-badge">
                    <a href="/electricity-calculation/1" class="order-link">
                        📱 <span class="badge-count">{{.ordersCount}}</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <main class="main">
        <div class="container">

            <div class="product-info">
                <div class="left-column">
                    <div class="image-container">
                        <img src="{{imageURL .camera.ImageKey}}" 
                             alt="{{.camera.Name}}" 
                             class="product-image"
                             onerror="this.src='/static/img/placeholder.jpg'">
                    </div>
                </div>

                <div class="right-column">
                    <div class="product-details">
                        <h1 class="product-title">{{.camera.Name}}</h1>
                        
                        
                        <div class="product-specs">
                            <div class="spec-item">
                                <span class="spec-label">Тип:</span>
                                <span class="spec-value">{{.camera.Type}}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Разрешение:</span>
                                <span class="spec-value">{{.camera.Resolution}}</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Мощность:</span>
                                <span class="spec-value">{{.camera.Power}} Вт</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Ночное видение:</span>
                                <span class="spec-value">{{if .camera.NightVision}}Да{{else}}Нет{{end}}</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Описание -->
            <div class="product-description">
                <h2 class="description-title">Описание</h2>
                <div class="description-text">
                    <p>{{.camera.Description}}</p>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
